<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERMEGALINKS</title>
    <link rel="stylesheet" href="styles/style.css">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.23/build/spline-viewer.js"></script>
</head>
<body>
    <spline-viewer url="https://prod.spline.design/vSjXie5Vy82tcP3s/scene.splinecode"></spline-viewer>
    <div class="container">
        <h1 class="glitch" data-text="LINKS">LINKS</h1>
        <div class="links">
            <div class="link discord-link">
                <img src="assets/images/discord-logo.svg" alt="Discord Logo">
                <a href="https://discord.gg/RTKx7MnrYf" class="link-text discord" data-text="DISCORD" target="_blank">DISCORD</a>
            </div>
            <div class="link youtube-link">
                <img src="assets/images/youtube-logo.svg" alt="YouTube Logo">
                <a href="https://www.youtube.com/@VmeMore" class="link-text youtube" data-text="YOUTUBE" target="_blank">YOUTUBE</a>
            </div>
            <div class="link twitch-link">
                <img src="assets/images/twitch-logo.svg" alt="Twitch Logo">
                <a href="https://www.twitch.tv/overmegakill" class="link-text twitch" data-text="TWITCH" target="_blank">TWITCH</a>
            </div>
            <div class="link tiktok-link">
                <img src="assets/images/tiktok-logo.svg" alt="TikTok Logo">
                <a href="https://www.tiktok.com/@overmegakill" class="link-text tiktok" data-text="TIKTOK" target="_blank">TIKTOK</a>
            </div>
        </div>
        <div id="audio-player" class="hidden">
            <audio id="audio-element" loop>
                <source src="assets/audios/videoplayback.m4a" type="audio/mp4">
                Votre navigateur ne supporte pas l'élément audio.
            </audio>
            <button id="play-audio">Play</button>
            <button id="pause-audio">Pause</button>
            <input type="range" id="audio-slider" min="0" value="0" step="1">
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>
</html>
